<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560">
  <rect width="100%" height="100%" fill="#111827"/>
  <text x="32" y="48" fill="#f3f4f6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">VGC Team Lab architecture</text>
  <text x="32" y="96" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">React SPA (GitHub Pages)</text>
<text x="32" y="124" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">  |-- PokeAPI (species, moves, learnsets)</text>
<text x="32" y="152" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">  |-- localStorage (teams, schema v3)</text>
<text x="32" y="180" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">  '-- Express proxy (Render)</text>
<text x="32" y="208" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">         |-- Pikalytics markdown -&gt; JSON (6h cache)</text>
<text x="32" y="236" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">         '-- Hugging Face Llama 3.2 (token server-side)</text>
<text x="32" y="264" fill="#9ca3af" font-family="Consolas, monospace" font-size="16"></text>
<text x="32" y="292" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">Team Builder: guided steps + health summary</text>
<text x="32" y="320" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">Legality: bundled rules + lazy learnset validation</text>
<text x="32" y="348" fill="#9ca3af" font-family="Consolas, monospace" font-size="16">Share: ?team= base64 payload (no database)</text>
</svg>